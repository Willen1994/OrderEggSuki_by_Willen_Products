<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Itlog App</title>
    <style>
        .pending { color: orange; font-weight: bold; }
        .completed { color: green; font-weight: bold; }
        /* Simple Loading Animation */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .loader { display: inline-block; width: 10px; height: 10px; background: orange; border-radius: 50%; animation: blink 1s infinite; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Itlog App Dashboard</h1>
    <div id="content"></div>
    <br><button id="logout">Logout</button>

    <script>
        const firebaseConfig = { /* I-PASTE DITO ULIT YUNG CONFIG MO */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const adminNumber = "+639159377840"; 

        firebase.auth().onAuthStateChanged(function(user) {
            if (!user) { window.location.href = "index.html"; return; }
            const content = document.getElementById('content');
            if (user.phoneNumber === adminNumber) {
                content.innerHTML = `<h3>Admin Panel</h3><ul id="order-list"></ul>`;
                loadAdminOrders();
            } else {
                content.innerHTML = `<h3>Mag-order</h3><input type="number" id="qty" placeholder="Ilang tray?"><button id="submit-order">Order</button>`;
                document.getElementById('submit-order').onclick = saveOrder;
            }
        });

        function updateStatus(docId) {
            db.collection("orders").doc(docId).update({
                status: "completed",
                deliveredAt: new Date().toLocaleString()
            });
        }

        function loadAdminOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    const li = document.createElement('li');
                    
                    if(o.status === 'pending') {
                        li.innerHTML = `${o.phoneNumber}: ${o.quantity} tray - <span class="pending"><div class="loader"></div> PENDING</span> 
                        <button onclick="updateStatus('${doc.id}')">Mark as Done</button>`;
                    } else {
                        li.innerHTML = `${o.phoneNumber}: ${o.quantity} tray - <span class="completed">✅ DONE!</span> 
                        <br><small>Delivered on: ${o.deliveredAt}</small>`;
                    }
                    list.appendChild(li);
                });
            });
        }

        function saveOrder() {
            const qty = document.getElementById('qty').value;
            if(!qty) return;
            db.collection("orders").add({
                phoneNumber: firebase.auth().currentUser.phoneNumber,
                quantity: parseInt(qty),
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("Order Success!"));
        }

        document.getElementById('logout').onclick = () => firebase.auth().signOut().then(() => location.href = "index.html");
    </script>
</body>
</html>
