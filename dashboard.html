<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Itlog App</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Welcome sa iyong Dashboard!</h1>
    <p>Naka-login ka na nang matagumpay.</p>
    
    <div id="order-section">
        <h3>Mag-order ng Itlog</h3>
        <input type="number" id="qty" placeholder="Ilang tray?">
        <button id="submit-order">Order Now</button>
    </div>

    <div id="admin-panel" style="display:none; margin-top: 30px; border-top: 2px solid black; padding-top: 10px;">
        <h3>Admin: Listahan ng Orders</h3>
        <ul id="order-list"></ul>
    </div>

    <br><br>
    <button id="logout">Logout</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDik6lpcisMqbkAHGj7ebLQCOfoUds0RM0",
            authDomain: "eggforyouapp.firebaseapp.com",
            projectId: "eggforyouapp",
            storageBucket: "eggforyouapp.appspot.com",
            messagingSenderId: "278734919378",
            appId: "1:278734919378:web:d814c1df08c1f6096e7f0b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const adminNumber = "+639159377840"; // <--- PALITAN MO NG NUMBER MO

        // Security Guard at Admin Check
        firebase.auth().onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = "index.html";
            } else {
                // Kung ikaw ang admin, ipakita ang admin panel
                if (user.phoneNumber === adminNumber) {
                    document.getElementById('admin-panel').style.display = 'block';
                    loadOrders();
                }
            }
        });

        // Function para sa pag-order
        document.getElementById('submit-order').addEventListener('click', function() {
            const qty = document.getElementById('qty').value;
            const user = firebase.auth().currentUser;

            if (qty > 0 && user) {
                db.collection("orders").add({
                    userId: user.uid,
                    phoneNumber: user.phoneNumber,
                    quantity: parseInt(qty),
                    status: "pending",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => {
                    alert("Order success!");
                    document.getElementById('qty').value = "";
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
            } else {
                alert("Maglagay ng tamang dami!");
            }
        });

        // Function para sa Admin List
        function loadOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const order = doc.data();
                    const li = document.createElement('li');
                    li.innerHTML = `Order ni ${order.phoneNumber}: <b>${order.quantity} tray/s</b> - Status: <i>${order.status}</i>`;
                    list.appendChild(li);
                });
            });
        }

        // Logout
        document.getElementById('logout').addEventListener('click', function() {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
