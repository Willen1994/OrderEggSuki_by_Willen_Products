<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Itlog App</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
</head>
<body>
    <div id="content">Naglo-load...</div>
    <br><button id="logout">Logout</button>

    <script>
        const firebaseConfig = { /* I-PASTE ULIT DITO ANG CONFIG MO */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const adminNumber = "+639159377840"; 

        firebase.auth().onAuthStateChanged(function(user) {
            if (!user) { window.location.href = "index.html"; return; }
            
            const content = document.getElementById('content');
            // Kunin ang profile info
            db.collection("users").doc(user.uid).get().then(doc => {
                const name = doc.exists ? doc.data().name : "Ka-Itlog";
                const photo = doc.exists ? doc.data().photoURL : "";

                if (user.phoneNumber.trim() === adminNumber.trim()) {
                    content.innerHTML = `<h3>Admin Panel</h3><ul id="order-list"></ul>`;
                    loadAdminOrders();
                } else {
                    content.innerHTML = `
                        <h3>Welcome, ${name}! 👋</h3>
                        <img src="${photo}" style="width:100px; border-radius:50%;" id="profile-img">
                        <br><input type="file" id="file-upload">
                        <button onclick="uploadPhoto()">Upload Photo</button>
                        <hr>
                        <h3>Mag-order</h3>
                        <input type="number" id="qty" placeholder="Ilang tray?">
                        <button id="submit-order">Order Now</button>`;
                    document.getElementById('submit-order').onclick = saveOrder;
                }
            });
        });

        // Function para mag-upload ng photo
        function uploadPhoto() {
            const file = document.getElementById('file-upload').files[0];
            const storageRef = storage.ref('profiles/' + firebase.auth().currentUser.uid);
            storageRef.put(file).then(() => {
                storageRef.getDownloadURL().then(url => {
                    db.collection("users").doc(firebase.auth().currentUser.uid).set({ photoURL: url }, { merge: true });
                    alert("Profile updated!");
                    location.reload();
                });
            });
        }
        
        // ... (Idagdag dito ang loadAdminOrders at saveOrder functions mula sa nakaraang code)
    </script>
</body>
</html>
