<!DOCTYPE html>
<html>
<head>
    <head>
    <title>Itlog Order App</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
</head>

</head>
<body>
    <h2>Login sa Itlog App</h2>

    <div id="login-form">
        <input type="tel" id="phone" placeholder="+639123456789">
        <button id="send-otp">Send OTP</button>
    </div>

    <div id="otp-form" style="display:none;">
        <input type="text" id="otp" placeholder="Enter 6-digit OTP">
        <button id="verify-otp">Verify Code</button>
    </div>

    <div id="recaptcha-container"></div>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyDik6lpcisMqbkAHGj7ebLQCOfoUds0RM0",
        authDomain: "eggforyouapp.firebaseapp.com",
        projectId: "eggforyouapp",
        storageBucket: "eggforyouapp.firebasestorage.app",
        messagingSenderId: "278734919378",
        appId: "1:278734919378:web:d814c1df08c1f6096e7f0b"
    };
    firebase.initializeApp(firebaseConfig);

    // I-setup ang reCAPTCHA verifier (Kailangan ito ng Firebase)
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
    });

    document.getElementById('send-otp').addEventListener('click', function() {
        const phoneNumber = document.getElementById('phone').value;
        const appVerifier = window.recaptchaVerifier;

        firebase.auth().signInWithPhoneNumber(phoneNumber, appVerifier)
            .then(function(confirmationResult) {
                // Success: Ipakita ang OTP input
                window.confirmationResult = confirmationResult;
                document.getElementById('otp-form').style.display = 'block';
                document.getElementById('login-form').style.display = 'none';
                alert("OTP sent!");
            }).catch(function(error) {
                console.error(error);
                alert("Error: " + error.message);
            });
    });

    document.getElementById('verify-otp').addEventListener('click', function() {
        const code = document.getElementById('otp').value;
        confirmationResult.confirm(code).then(function(result) {
            alert("Login Successful!");
        }).catch(function(error) {
            alert("Invalid OTP");
        });
    });
</script>

</body>
</html>
